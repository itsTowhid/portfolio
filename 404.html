<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Towhid</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }

        .not-found-container {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 2rem;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .error-description {
            color: var(--text-secondary);
            font-size: 1.125rem;
            max-width: 500px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: var(--accent);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        #flowfield-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .main-content {
            position: relative;
            z-index: 1;
        }

        .footer {
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .error-description {
                font-size: 1rem;
            }

            .error-actions {
                flex-direction: column;
                width: 100%;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <canvas id="flowfield-canvas"></canvas>

    <main class="main-content">
        <div class="not-found-container">
            <div class="error-code" data-en="404" data-bn="৪০৪">404</div>
            <h1 class="error-title" data-en="Page Not Found" data-bn="পৃষ্ঠা পাওয়া যায়নি">Page Not Found</h1>
            <p class="error-description"
                data-en="Oops! The page you're looking for seems to have wandered off into the digital void. Don't worry, even the best code has bugs sometimes."
                data-bn="দুঃখিত! আপনি যে পৃষ্ঠাটি খুঁজছেন সেটি মনে হয় ডিজিটাল শূন্যতায় হারিয়ে গেছে। চিন্তা করবেন না, সেরা কোডেও বাগ থাকে।">
                Oops! The page you're looking for seems to have wandered off into the digital void. Don't worry, even
                the best code has bugs sometimes.
            </p>

            <div class="error-actions">
                <a href="index.html" class="btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    <span data-en="Go Home" data-bn="হোম এ যান">Go Home</span>
                </a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-left">
            <span data-en="© 2026 Built with" data-bn="© ২০২৬ তৈরি করা হয়েছে">© 2026 Built with</span> <span
                class="heart">❤</span> <span data-en="by" data-bn="দ্বারা">by</span> Towhid
        </div>
    </footer>

    <script src="flowfield.js"></script>
    <script>
        // Initialize language from localStorage (same as app.js)
        document.addEventListener('DOMContentLoaded', () => {
            // Get language from localStorage (same key as app.js)
            const lang = localStorage.getItem('lang') || 'en';

            // Update all elements with data-en and data-bn attributes
            document.querySelectorAll('[data-en]').forEach(element => {
                const text = element.getAttribute(`data-${lang}`);
                if (text) {
                    element.textContent = text;
                }
            });

            // Make canvas visible
            const canvas = document.getElementById('flowfield-canvas');
            if (canvas) {
                canvas.classList.add('anim-visible');
            }

            // Start animation automatically
            if (typeof startAnimation === 'function') {
                setTimeout(() => {
                    startAnimation();
                }, 100);
            }
        });
    </script>
</body>

</html>
